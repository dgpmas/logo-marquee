<!DOCTYPE html>
<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow:hidden;
    background:#222222;
}

.marquee{
    position:relative;
    width:100%;
    overflow:hidden;
    padding:22px 0;
    background:#222222;
}

.marquee::before,
.marquee::after{
    content:"";
    position:absolute;
    top:0;
    width:90px;
    height:100%;
    z-index:2;
    pointer-events:none;
}

.marquee::before{
    left:0;
    background:linear-gradient(
        to right,
        #222222,
        rgba(34,34,34,0)
    );
}

.marquee::after{
    right:0;
    background:linear-gradient(
        to left,
        #222222,
        rgba(34,34,34,0)
    );
}

.track{
    display:flex;
    align-items:center;
    width:max-content;
    will-change:transform;
    animation:scroll 70s linear infinite;
}

.logo{
    height:54px;
    width:auto;
    margin:0 42px;
    flex-shrink:0;

    opacity:.7;

    transition:
    opacity .25s ease,
    transform .25s ease,
    filter .25s ease;
}

.logo:hover{
    opacity:1;

    transform:scale(1.06);

    filter:
    brightness(0)
    invert(1)
    drop-shadow(0 0 8px rgba(255,255,255,.45));
}

@keyframes scroll{
    from{
        transform:translate3d(0,0,0);
    }

    to{
        transform:translate3d(-50%,0,0);
    }
}

/* TABLET */

@media (max-width:900px){

    .track{
        animation-duration:55s;
    }

    .logo{
        height:44px;
        margin:0 32px;
    }

    .marquee::before,
    .marquee::after{
        width:60px;
    }
}

/* MÓVIL */

@media (max-width:600px){

    .marquee{
        padding:16px 0;
    }

    .track{
        animation-duration:42s;
    }

    .logo{
        height:34px;
        margin:0 24px;
    }

    .marquee::before,
    .marquee::after{
        width:45px;
    }
}

</style>
</head>
