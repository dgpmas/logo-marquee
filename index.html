<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow:hidden;
    background:#222222;
}

.marquee{
    position:relative;
    width:100%;
    overflow:hidden;
    padding:22px 0;
    background:#222222;
}

.marquee::before,
.marquee::after{
    content:"";
    position:absolute;
    top:0;
    width:90px;
    height:100%;
    z-index:2;
    pointer-events:none;
}

.marquee::before{
    left:0;
    background:linear-gradient(to right, #222222, rgba(34,34,34,0));
}

.marquee::after{
    right:0;
    background:linear-gradient(to left, #222222, rgba(34,34,34,0));
}

.track{
    display:flex;
    align-items:center;
    width:max-content;
    will-change:transform;
    animation:scroll 70s linear infinite;
}

.logo-wrap{
    width:240px;
    height:80px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
}

.logo{
    width:auto;
    height:auto;
    display:block;
    object-fit:contain;
}

/* Ajustes automáticos según proporción */

.logo-extra-wide{
    max-width:88%;
    max-height:44%;
}

.logo-wide{
    max-width:84%;
    max-height:56%;
}

.logo-square{
    max-width:58%;
    max-height:76%;
}

.logo-tall{
    max-width:48%;
    max-height:82%;
}

@keyframes scroll{
    from{
        transform:translate3d(0,0,0);
    }

    to{
        transform:translate3d(-50%,0,0);
    }
}

/* TABLET */

@media (max-width:900px){

    .track{
        animation-duration:55s;
    }

    .logo-wrap{
        width:180px;
        height:65px;
    }

    .marquee::before,
    .marquee::after{
        width:60px;
    }
}

/* MÓVIL */

@media (max-width:600px){

    .marquee{
        padding:16px 0;
    }

    .track{
        animation-duration:42s;
    }

    .logo-wrap{
        width:140px;
        height:55px;
    }

    .marquee::before,
    .marquee::after{
        width:45px;
    }
}
</style>
</head>

<body>

<div class="marquee">
    <div class="track" id="logoTrack"></div>
</div>

<script>
const track = document.getElementById("logoTrack");

const logos = [
    "logo01.svg",
    "logo02.svg",
    "logo03.svg",
    "logo04.svg",
    "logo05.svg",
    "logo06.svg",
    "logo07.svg",
    "logo08.svg",
    "logo09.svg",
    "logo10.svg",
    "logo11.svg",
    "logo12.svg",
    "logo13.svg",
    "logo14.svg",
    "logo15.svg",
    "logo16.svg",
    "logo17.svg",
    "logo18.svg",
    "logo19.svg",
    "logo20.svg",
    "logo21.svg",
    "logo22.svg",
    "logo23.svg",
    "logo24.svg",
    "logo25.svg",
    "logo26.svg",
    "logo27.svg"
];

const duplicatedLogos = [...logos, ...logos];

duplicatedLogos.forEach(file => {
    const wrap = document.createElement("div");
    wrap.className = "logo-wrap";

    const img = document.createElement("img");
    img.src = "logos/" + file;
    img.className = "logo";
    img.alt = file.replace(".svg", "");

    img.onload = function(){
        const ratio = img.naturalWidth / img.naturalHeight;

        if(ratio >= 4){
            img.classList.add("logo-extra-wide");
        }else if(ratio >= 2){
            img.classList.add("logo-wide");
        }else if(ratio <= 0.9){
            img.classList.add("logo-tall");
        }else{
            img.classList.add("logo-square");
        }
    };

    wrap.appendChild(img);
    track.appendChild(wrap);
});
</script>

</body>
</html>
