<meta charset="UTF-8">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    overflow:hidden;
    background:#222222;
}

.marquee{
    position:relative;
    width:100%;
    overflow:hidden;
    padding:22px 0;
    background:#222222;
}

.marquee::before,
.marquee::after{
    content:"";
    position:absolute;
    top:0;
    width:90px;
    height:100%;
    z-index:2;
    pointer-events:none;
}

.marquee::before{
    left:0;
    background:linear-gradient(
        to right,
        #222222,
        rgba(34,34,34,0)
    );
}

.marquee::after{
    right:0;
    background:linear-gradient(
        to left,
        #222222,
        rgba(34,34,34,0)
    );
}

.track{
    display:flex;
    align-items:center;
    width:max-content;
    will-change:transform;
    animation:scroll 70s linear infinite;
}

.logo-wrap{
    width:240px;
    height:80px;

    display:flex;
    align-items:center;
    justify-content:center;

    flex-shrink:0;
}

.logo{
    max-width:80%;
    max-height:80%;
    width:auto;
    height:auto;
    display:block;
}

@keyframes scroll{
    from{
        transform:translate3d(0,0,0);
    }

    to{
        transform:translate3d(-50%,0,0);
    }
}

/* TABLET */

@media (max-width:900px){

    .track{
        animation-duration:55s;
    }

    .logo-wrap{
        width:180px;
        height:65px;
    }

    .marquee::before,
    .marquee::after{
        width:60px;
    }
}

/* MÓVIL */

@media (max-width:600px){

    .track{

    }

    .logo-wrap{
        width:140px;
        height:55px;
    }

    .marquee::before,
    .marquee::after{
        width:45px;
    }
}
